<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Désamorçage de bombe</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #1a1a1a;
    color: #f0f0f0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
  }
  .bomb-wrap {
    margin-bottom: 20px;
    position: relative;
  }
  .wire-path {
    cursor: pointer;
  }
  .wire-path:hover {
    filter: brightness(1.3);
  }
  .wire-path.disabled {
    pointer-events: none;
  }
  .scissor-icon {
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  #result-banner {
    display: none;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  #result-banner.boom {
    background: #3a1414;
    border: 1px solid #ff3b30;
  }
  #result-banner.win {
    background: #143a1a;
    border: 1px solid #34c759;
  }
  #result-title {
    font-size: 20px;
    font-weight: 700;
    margin: 10px 0 0;
  }
  #result-banner.boom #result-title { color: #ff3b30; }
  #result-banner.win #result-title { color: #34c759; }
  #status-text {
    font-size: 13px;
    color: #888;
    margin-top: 10px;
  }
  .reset-btn {
    margin-top: 14px;
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .reset-btn:hover {
    background: #2a2a2a;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Désamorçage de bombe</h1>
  <p class="subtitle">Clique directement sur le bon fil avant la fin du minuteur</p>

  <div class="bomb-wrap" id="bomb-svg-container"></div>

  <div id="result-banner"></div>

  <p id="status-text">Clique sur un fil pour le couper.</p>
  <button class="reset-btn" id="reset-btn">Recommencer</button>
</div>

<script>
(function() {
  // ---- SVG du bloc de C4 avec minuteur intégré et quatre fils cliquables ----
  var svgMarkup = '\
<svg viewBox="0 0 400 320" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">\
  <defs>\
    <linearGradient id="c4grad" x1="0" y1="0" x2="0" y2="1">\
      <stop offset="0%" stop-color="#d9c98a"/>\
      <stop offset="100%" stop-color="#b8a563"/>\
    </linearGradient>\
    <linearGradient id="wrapgrad" x1="0" y1="0" x2="1" y2="0">\
      <stop offset="0%" stop-color="#e8dca0"/>\
      <stop offset="50%" stop-color="#c9b876"/>\
      <stop offset="100%" stop-color="#e8dca0"/>\
    </linearGradient>\
  </defs>\
\
  <!-- bloc principal de C4 (pain explosif rectangulaire enveloppé) -->\
  <rect x="50" y="70" width="300" height="120" rx="6" fill="url(#c4grad)" stroke="#5c4f28" stroke-width="3"/>\
  <rect x="50" y="70" width="300" height="120" rx="6" fill="none" stroke="#8a7a40" stroke-width="1" stroke-dasharray="2 4"/>\
  <!-- plis de l\'emballage -->\
  <line x1="50" y1="100" x2="350" y2="100" stroke="#a0904f" stroke-width="1.5" opacity="0.6"/>\
  <line x1="50" y1="160" x2="350" y2="160" stroke="#8a7a40" stroke-width="1.5" opacity="0.6"/>\
  <line x1="120" y1="70" x2="120" y2="190" stroke="#a0904f" stroke-width="1" opacity="0.4"/>\
  <line x1="280" y1="70" x2="280" y2="190" stroke="#a0904f" stroke-width="1" opacity="0.4"/>\
  <!-- etiquette C4 -->\
  <rect x="155" y="118" width="90" height="34" rx="3" fill="#3a2f18" stroke="#1a1408" stroke-width="2"/>\
  <text x="200" y="142" text-anchor="middle" font-family="Courier New, monospace" font-size="20" fill="#e8dca0" font-weight="bold">C-4</text>\
\
  <!-- boitier detonateur / minuteur sur le dessus -->\
  <rect x="130" y="20" width="140" height="56" rx="6" fill="#222" stroke="#000" stroke-width="2"/>\
  <rect x="140" y="28" width="120" height="28" rx="3" fill="#0a0a0a" stroke="#333" stroke-width="1"/>\
  <text id="timer-display" x="200" y="48" text-anchor="middle" font-family="Courier New, monospace" font-size="17" fill="#ff3b30" font-weight="bold">01:30:00</text>\
  <circle cx="148" cy="66" r="4" fill="#ff3b30"/>\
  <circle cx="200" cy="66" r="4" fill="#ffcc00"/>\
  <circle cx="252" cy="66" r="4" fill="#34c759"/>\
\
  <!-- connecteur entre boitier et bloc -->\
  <rect x="190" y="76" width="20" height="10" fill="#444"/>\
\
  <!-- les quatre fils, partant du boitier vers le bas du bloc -->\
  <path class="wire-path" data-color="bleu" d="M 150 76 C 110 110, 75 150, 60 195" stroke="#2979ff" stroke-width="9" fill="none" stroke-linecap="round"/>\
  <path class="wire-path" data-color="vert" d="M 178 76 C 165 120, 150 160, 140 195" stroke="#34c759" stroke-width="9" fill="none" stroke-linecap="round"/>\
  <path class="wire-path" data-color="jaune" d="M 222 76 C 235 120, 250 160, 260 195" stroke="#ffcc00" stroke-width="9" fill="none" stroke-linecap="round"/>\
  <path class="wire-path" data-color="rouge" d="M 250 76 C 290 110, 325 150, 340 195" stroke="#ff3b30" stroke-width="9" fill="none" stroke-linecap="round"/>\
\
  <!-- petits pieds du bloc -->\
  <rect x="65" y="190" width="20" height="10" rx="2" fill="#5c4f28"/>\
  <rect x="315" y="190" width="20" height="10" rx="2" fill="#5c4f28"/>\
</svg>';

  var explosionSvg = '\
<svg viewBox="0 0 220 220" width="160" height="160" xmlns="http://www.w3.org/2000/svg">\
  <circle cx="110" cy="110" r="100" fill="#ff3b30" opacity="0.25"/>\
  <circle cx="110" cy="110" r="75" fill="#ff6a30" opacity="0.4"/>\
  <polygon points="110,8 134,78 200,60 144,112 196,170 122,144 110,214 98,144 24,170 76,112 20,60 86,78" fill="#ff3b30"/>\
  <polygon points="110,42 124,84 168,72 134,104 164,146 116,130 110,182 104,130 56,146 86,104 52,72 96,84" fill="#ffcc00"/>\
  <polygon points="110,66 118,92 144,84 124,102 142,128 114,118 110,150 106,118 78,128 96,102 76,84 102,92" fill="#fff3b0"/>\
</svg>';

  var checkSvg = '\
<svg viewBox="0 0 100 100" width="80" height="80" xmlns="http://www.w3.org/2000/svg">\
  <circle cx="50" cy="50" r="46" fill="none" stroke="#34c759" stroke-width="6"/>\
  <path d="M 28 52 L 44 68 L 74 34" fill="none" stroke="#34c759" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>\
</svg>';

  var container = document.getElementById('bomb-svg-container');
  container.innerHTML = svgMarkup;

  // ---- logique du jeu ----
  var totalSeconds = 90 * 60;
  var remaining = totalSeconds;
  var finished = false;
  var timerEl = document.getElementById('timer-display');
  var bannerEl = document.getElementById('result-banner');
  var statusEl = document.getElementById('status-text');
  var wires = container.querySelectorAll('.wire-path');
  var resetBtn = document.getElementById('reset-btn');
  var interval = null;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function formatTime(s) {
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = s % 60;
    return pad(h) + ':' + pad(m) + ':' + pad(sec);
  }

  function disableWires() {
    wires.forEach(function(w) { w.classList.add('disabled'); });
  }

  function enableWires() {
    wires.forEach(function(w) { w.classList.remove('disabled'); });
  }

  function showBoom() {
    finished = true;
    disableWires();
    bannerEl.className = 'boom';
    bannerEl.style.display = 'block';
    bannerEl.innerHTML = explosionSvg + '<p id="result-title">Boum, vous avez perdu</p>';
    statusEl.textContent = 'La bombe a explosé.';
  }

  function showWin() {
    finished = true;
    disableWires();
    bannerEl.className = 'win';
    bannerEl.style.display = 'block';
    bannerEl.innerHTML = checkSvg + '<p id="result-title">Bravo, vous avez sauvé la ville !</p>';
    statusEl.textContent = 'Fil rouge coupé à temps.';
  }

  function startTimer() {
    interval = setInterval(function() {
      if (finished) { clearInterval(interval); return; }
      remaining -= 1;
      if (remaining <= 0) {
        remaining = 0;
        timerEl.textContent = formatTime(0);
        showBoom();
        clearInterval(interval);
        return;
      }
      timerEl.textContent = formatTime(remaining);
    }, 1000);
  }

  function resetGame() {
    finished = false;
    remaining = totalSeconds;
    timerEl.textContent = formatTime(remaining);
    bannerEl.style.display = 'none';
    bannerEl.innerHTML = '';
    statusEl.textContent = 'Clique sur un fil pour le couper.';
    enableWires();
    wires.forEach(function(w) { w.style.opacity = '1'; });
    if (interval) clearInterval(interval);
    startTimer();
  }

  wires.forEach(function(wire) {
    wire.addEventListener('click', function() {
      if (finished) return;
      var color = wire.getAttribute('data-color');
      clearInterval(interval);
      wire.style.opacity = '0.3';
      if (color === 'rouge') {
        showWin();
      } else {
        showBoom();
      }
    });
  });

  resetBtn.addEventListener('click', resetGame);

  timerEl.textContent = formatTime(remaining);
  startTimer();
})();
</script>
</body>
</html>
